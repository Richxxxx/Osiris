version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: evaluaciones_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-EvaluacionesDesem}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - evaluaciones_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "${DB_USER:-postgres}", "-d", "${DB_NAME:-EvaluacionesDesem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: docker/dev/Dockerfile
    container_name: evaluaciones_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-9092}
      # Conexión a base de datos dentro de Docker
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Sol2025**}
      DB_NAME: ${DB_NAME:-EvaluacionesDesem}
      JWT_SECRET: ${JWT_SECRET:-tu_clave_secreta_muy_segura}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.zoho.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-desarrollo@solucionescorp.com.co}
      EMAIL_PASS: ${EMAIL_PASS:-default_password}
      EMAIL_FROM: ${EMAIL_FROM:-desarrollo@solucionescorp.com.co}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-9092}:9092"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evaluaciones_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React con Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/dev/Dockerfile
    container_name: evaluaciones_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - evaluaciones_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  evaluaciones_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
