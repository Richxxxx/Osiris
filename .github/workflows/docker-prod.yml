name: Deploy to Production

env:
  SERVER: Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-prod"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub container registry
        uses: docker/login-action@v1.10.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Lowercase the repo name and username
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/frontend:latest
          context: ./frontend
          file: ./frontend/docker/prod/Dockerfile
          build-args: |
            "VITE_API_URL=${{vars.PROD_API_URL}}"
            "VITE_CLIENT_URL=${{vars.PROD_CLIENT_URL}}"

      - name: Build & Push Backend
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO }}/backend:latest
          context: ./backend
          file: ./backend/docker/prod/Dockerfile
          build-args: |
            "PORT=9092"
            "DB_HOST=${{secrets.PROD_DB_HOST}}"
            "DB_PORT=${{secrets.PROD_DB_PORT}}"
            "DB_NAME=${{secrets.PROD_DB_NAME}}"
            "DB_USER=${{secrets.PROD_DB_USER}}"
            "DB_PASSWORD=${{secrets.PROD_DB_PASSWORD}}"
            "JWT_SECRET=${{secrets.PROD_JWT_SECRET}}"
            "CLIENT_URL=${{vars.PROD_CLIENT_URL}}"
            "EMAIL_HOST=${{secrets.PROD_EMAIL_HOST}}"
            "EMAIL_PORT=${{secrets.PROD_EMAIL_PORT}}"
            "EMAIL_USER=${{secrets.PROD_EMAIL_USER}}"
            "EMAIL_PASS=${{secrets.PROD_EMAIL_PASS}}"
            "EMAIL_FROM=${{vars.PROD_EMAIL_FROM}}"

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.PROD_SSH_HOST}}
          username: ${{secrets.PROD_SSH_USER}}
          key: ${{secrets.PROD_SSH_KEY}}
          script: |
            cd /opt/evaluaciones
            
            # Pull new images
            docker pull ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}
            docker pull ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}
            
            # Update docker-compose with new tags
            sed -i "s|ghcr.io/.*/backend:.*|ghcr.io/${{ env.REPO }}/backend:${{ github.sha }}|" docker-compose.prod.yml
            sed -i "s|ghcr.io/.*/frontend:.*|ghcr.io/${{ env.REPO }}/frontend:${{ github.sha }}|" docker-compose.prod.yml
            
            # Deploy with zero downtime
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
            
            # Cleanup old images
            docker image prune -f